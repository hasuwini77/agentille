name: feature-team
description: Cross-layer feature implementation with code + design review running in parallel.
lead: agentille:agentille-planner
teammates:
  # count is a DEFAULT — the lead spawns one executor per vertical slice the
  # planner emits (capped at profile.team.maxTeammates, batched 3 at a time).
  - role: agentille:agentille-executor
    count: 2
    # false: the master plan is already plan-reviewed before any executor runs,
    # so a per-executor plan→approve round-trip is redundant latency. Set true
    # only for explicitly risky/destructive work.
    require-plan-approval: false
  - role: agentille:agentille-code-reviewer
    count: 1
  - role: agentille:agentille-design-reviewer
    count: 1
# Roles map to agents/agentille-*.md; the orchestrator spawns them as the
# namespaced subagent_type `agentille:agentille-<role>`. Display mode (panes vs
# in-process) is the user's `teammateMode` setting, not declared here. The log
# line is written by the orchestrator, not a hook (see skills/agt/SKILL.md).
