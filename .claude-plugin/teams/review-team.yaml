name: review-team
description: Parallel multi-pillar review (code + design + security) of a change set.
lead: agentille:agentille-planner
teammates:
  - role: agentille:agentille-code-reviewer
    count: 1
  - role: agentille:agentille-design-reviewer
    count: 1
  - role: agentille:agentille-security-reviewer
    count: 1
# Roles map to agents/agentille-*.md; the orchestrator spawns them as the
# namespaced subagent_type `agentille:agentille-<role>`. Display mode (panes vs
# in-process) is the user's `teammateMode` setting, not declared here. The log
# line is written by the orchestrator, not a hook (see skills/agt/SKILL.md).
